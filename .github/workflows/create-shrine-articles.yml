name: Create Abstract Wikipedia Articles

on:
  workflow_dispatch:
    inputs:
      qids:
        description: 'Comma-separated QIDs to create (e.g. Q60,Q1653,Q602)'
        required: true
      apply:
        description: 'Actually create articles (true/false)'
        required: false
        default: 'false'

jobs:
  create-articles:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Create articles
        env:
          WIKI_USERNAME: ${{ vars.WIKI_USERNAME }}
          WIKI_MAIN_PASSWORD: ${{ secrets.WIKI_MAIN_PASSWORD }}
        run: |
          if [ "${{ github.event.inputs.apply }}" = "true" ]; then
            python create_from_qid.py --batch "${{ github.event.inputs.qids }}" --apply --delay 10
          else
            python create_from_qid.py --batch "${{ github.event.inputs.qids }}"
          fi
