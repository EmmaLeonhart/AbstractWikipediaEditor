# DISABLED: Cannot authenticate in CI due to email 2FA on the wiki account.
# Article creation is done locally via: python create_from_qid.py --batch Q1,Q2 --apply --headed
# Kept for reference in case auth is resolved in the future.

name: Create Abstract Wikipedia Articles (disabled)

on:
  workflow_dispatch:
    inputs:
      qids:
        description: 'Comma-separated QIDs to create (e.g. Q60,Q1653,Q602)'
        required: true
      apply:
        description: 'Actually create articles (true/false)'
        required: false
        default: 'false'

jobs:
  create-articles:
    if: false  # Disabled - email 2FA blocks CI login
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Create articles
        env:
          WIKI_USERNAME: ${{ vars.WIKI_USERNAME }}
          WIKI_MAIN_PASSWORD: ${{ secrets.WIKI_MAIN_PASSWORD }}
        run: |
          if [ "${{ github.event.inputs.apply }}" = "true" ]; then
            python create_from_qid.py --batch "${{ github.event.inputs.qids }}" --apply --delay 10
          else
            python create_from_qid.py --batch "${{ github.event.inputs.qids }}"
          fi
