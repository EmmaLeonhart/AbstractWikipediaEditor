name: Create Shinto Shrine Articles

on:
  workflow_dispatch:
    inputs:
      max_edits:
        description: 'Maximum number of articles to create'
        required: false
        default: '100'
      apply:
        description: 'Actually create articles (true/false)'
        required: false
        default: 'false'

jobs:
  create-articles:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch Shinto shrine QIDs
        run: python fetch_shinto_shrines.py

      - name: Create shrine articles
        env:
          WIKI_USERNAME: ${{ vars.WIKI_USERNAME }}
          WIKI_PASSWORD: ${{ secrets.WIKI_PASSWORD }}
        run: |
          if [ "${{ github.event.inputs.apply }}" = "true" ]; then
            python create_shrine_articles.py --apply --max-edits ${{ github.event.inputs.max_edits }}
          else
            python create_shrine_articles.py --max-edits ${{ github.event.inputs.max_edits }}
          fi

      - name: Upload QIDs artifact
        uses: actions/upload-artifact@v4
        with:
          name: shrine-qids
          path: shrine_qids.json
