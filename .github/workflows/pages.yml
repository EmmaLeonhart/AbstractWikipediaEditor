name: Build Article Catalog

on:
  push:
    branches: [master]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Build site (skip archiving - handled separately)
        run: python build_pages.py --no-archive

      - name: Retry previous archive failures
        run: |
          if [ -f data/archive_failures.json ]; then
            python -c "
          import json, requests, time, sys
          with open('data/archive_failures.json') as f:
              failures = json.load(f)
          if not failures:
              print('No failures to retry')
              sys.exit(0)
          print(f'Retrying {len(failures)} failed archives...')
          session = requests.Session()
          session.headers.update({'User-Agent': 'AbstractTestBot/1.0'})
          still_failed = []
          for qid in failures:
              url = f'https://abstract.wikipedia.org/wiki/{qid}'
              try:
                  r = session.post('https://web.archive.org/save/', data={'url': url}, timeout=120)
                  if r.status_code in (200, 302):
                      print(f'  {qid}: OK')
                  else:
                      print(f'  {qid}: {r.status_code}')
                      still_failed.append(qid)
              except Exception as e:
                  print(f'  {qid}: {e}')
                  still_failed.append(qid)
              time.sleep(15)
          with open('data/archive_failures.json', 'w') as f:
              json.dump(still_failed, f, indent=2)
          print(f'Done. {len(still_failed)} still failing.')
          "
          fi

      - name: Convert markdown to HTML
        run: |
          pip install markdown
          python -c "
          import markdown, glob, os
          md = markdown.Markdown(extensions=['tables', 'fenced_code'])
          css = '''<style>
          body{font-family:system-ui,sans-serif;max-width:900px;margin:2em auto;padding:0 1em;line-height:1.6;color:#333}
          h1{border-bottom:2px solid #3366cc;padding-bottom:.3em}
          h2{color:#3366cc;margin-top:1.5em}
          table{border-collapse:collapse;width:100%}
          th,td{border:1px solid #ddd;padding:8px;text-align:left}
          th{background:#f5f5f5}
          tr:hover{background:#f9f9f9}
          pre{background:#f5f5f5;padding:1em;border-radius:4px;overflow-x:auto}
          code{background:#f0f0f0;padding:2px 4px;border-radius:3px}
          a{color:#3366cc}
          </style>'''
          for mdfile in glob.glob('site/**/*.md', recursive=True):
              with open(mdfile, 'r', encoding='utf-8') as f:
                  text = f.read()
              # Strip YAML frontmatter
              if text.startswith('---'):
                  parts = text.split('---', 2)
                  if len(parts) >= 3:
                      text = parts[2]
              md.reset()
              html = md.convert(text)
              outpath = mdfile.replace('.md', '.html')
              with open(outpath, 'w', encoding='utf-8') as f:
                  f.write(f'<!DOCTYPE html><html><head><meta charset=\"utf-8\">{css}</head><body>{html}</body></html>')
              os.remove(mdfile)
          print(f'Converted {len(glob.glob(\"site/**/*.html\", recursive=True))} files')
          "

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
