<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'">
  <title>Abstract Wikipedia Editor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1e1e2e; color: #cdd6f4; padding: 16px; }

    .top-bar {
      display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
    }
    .top-bar input {
      background: #313244; border: 1px solid #45475a; color: #cdd6f4;
      padding: 8px 14px; border-radius: 4px; font-size: 16px; width: 160px;
    }
    .top-bar input::placeholder { color: #585b70; font-style: italic; }
    .top-bar input:focus { outline: none; border-color: #89b4fa; }
    button {
      border: none; padding: 8px 18px; border-radius: 4px; font-size: 14px;
      cursor: pointer; font-weight: 600;
    }
    .btn-wikidata { background: #a6e3a1; color: #1e1e2e; }
    .btn-wikidata:hover { background: #94e2d5; }
    .btn-abstract { background: #89b4fa; color: #1e1e2e; }
    .btn-abstract:hover { background: #74c7ec; }
    .btn-push { background: #fab387; color: #1e1e2e; }
    .btn-push:hover { background: #f9e2af; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .status { margin-left: auto; font-size: 13px; color: #6c7086; }

    .preview {
      background: #181825; border: 1px solid #313244; border-radius: 6px;
      padding: 16px; margin-bottom: 12px; min-height: 80px;
      font-size: 15px; line-height: 1.8;
    }
    .preview .sentence {
      margin-bottom: 6px;
    }
    .preview a.label {
      color: #89b4fa; text-decoration: underline; text-decoration-style: dotted;
      cursor: pointer;
    }
    .preview a.label:hover { color: #74c7ec; }
    .preview .placeholder { color: #6c7086; font-style: italic; }

    textarea {
      width: 100%; height: calc(100vh - 260px); background: #1e1e2e;
      border: 1px solid #313244; border-radius: 6px; color: #cdd6f4;
      padding: 14px; font-family: 'Consolas', 'Fira Code', monospace;
      font-size: 14px; line-height: 1.6; resize: none; outline: none;
    }
    textarea:focus { border-color: #45475a; }

    .info {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 6px; font-size: 12px; color: #6c7086;
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <input type="text" id="qid-input" placeholder="Enter QID...">
    <button class="btn-wikidata" id="btn-wikidata">Pull from Wikidata</button>
    <button class="btn-abstract" id="btn-abstract">Pull from Abstract Wikipedia</button>
    <button class="btn-push" id="btn-push" disabled>Push to Abstract Wikipedia</button>
    <span class="status" id="status"></span>
  </div>

  <div class="preview" id="preview">
    <span class="placeholder">Enter a QID and pull to see a preview.</span>
  </div>

  <div class="info">
    <span id="info-left"></span>
    <span id="info-right">Aliases: location, is a, kind of, role, describe, spo, are, superlative</span>
  </div>

  <textarea id="editor" placeholder="Wikitext will appear here..."></textarea>

  <script src="./dist/renderer.js"></script>
</body>
</html>
